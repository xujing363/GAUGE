benchmark_id: 01_random_cell_split_HVG2000
benchmark_name: Random Cell Split HVG2000

split_type: random_cell
split_seed: 7
train_fraction: 0.7
val_fraction: 0.1
test_fraction: 0.2

n_components: 512
n_hvg: 2000

epochs: 50
batch_size: 512
eval_batch_size: null
lr: 0.00006
top_k: 5

input_projection:
  mode: hvg
  hvg_n_genes: 2000
  pca_n_components: 512
  hvg_selection_method: variance




# model / world_model / training / batch / evaluation 的语义与 01_random_cell_split 相同。
# 这里只强调：drug-disjoint 切分会更难，因为模型不能靠“见过同一个药”的记忆来投机。
model:
  mode: drug_residual_world_model
  target_field: AUC
world_model:
  relative_value:
    enabled: true
    train_field: relative_value_train
    eval_field: relative_value_eval
    direction: auc_lower_is_better
  terminal_consequence:
    enabled: true
  planner:
    enabled: true
    top_k: 5

training:
  loss_raw_weight: 1.0
  loss_value_weight: 0.5
  loss_drug_centered_weight: 2.0
  loss_within_drug_rank_weight: 0.5
  loss_policy_advantage_weight: 0.0
  loss_graph_consistency_weight: 0.02
  validation_objective: val_within_drug_pcc
batch:
  sampler: hybrid_drug_level
  n_cell_lines: 32
  n_drugs: 16
  rank_batch_fraction: 0.25
# evaluation:
#   planner_metric_field: relative_value_eval
#   fusion_selection_metric: within_drug_pcc_mean
#   fusion_weight_candidates: [0.0, 0.5, 1.0, 1.5, 2.0]
#   target_within_drug_pcc: 0.6
#   sample_guardrail_delta: 0.01
#   strict_test_rows: 45583
#   strict_test_drugs: 57
evaluation_profiles:
  - gdsc
export_planning_predictions: true
export_terminal_latents: true
export_gate_audit: true
max_rows: null
gdsc_source_mode: v2
notes:
  - Unseen-drug holdout benchmark with per-heldout-drug ranking metrics.


max_rows: null
gdsc_source_mode: v2

prior:
  chembl:
    enabled: true
    weight: 1.0
    node_types: [drug, target, action_type, target_type, mechanism]
    edge_types: [action_type_target, has_action_type, acts_on_target, target_has_target_type, drug_has_mechanism, mechanism_targets_target]
  drkg:
    enabled: true
    weight: 1.0
    node_types: [drug, gene, protein, disease, pathway, side_effect, symptom, anatomy, biological_process, molecular_function, cellular_component, taxonomy, other]
    edge_types: [drug_gene, drug_protein, drug_disease, drug_pathway, drug_side_effect, drug_symptom, drug_anatomy, drug_biological_process, drug_molecular_function, drug_cellular_component, drug_taxonomy, drug_other, gene_gene, gene_protein, disease_gene, gene_pathway, gene_side_effect, gene_symptom, anatomy_gene, biological_process_gene, gene_molecular_function, cellular_component_gene, gene_taxonomy, gene_other, protein_protein, disease_protein, pathway_protein, protein_side_effect, protein_symptom, anatomy_protein, biological_process_protein, molecular_function_protein, cellular_component_protein, protein_taxonomy, other_protein, disease_disease, disease_pathway, disease_side_effect, disease_symptom, anatomy_disease, biological_process_disease, disease_molecular_function, cellular_component_disease, disease_taxonomy, disease_other, pathway_pathway, pathway_side_effect, pathway_symptom, anatomy_pathway, biological_process_pathway, molecular_function_pathway, cellular_component_pathway, pathway_taxonomy, other_pathway, side_effect_side_effect, side_effect_symptom, anatomy_side_effect, biological_process_side_effect, molecular_function_side_effect, cellular_component_side_effect, side_effect_taxonomy, other_side_effect, symptom_symptom, anatomy_symptom, biological_process_symptom, molecular_function_symptom, cellular_component_symptom, symptom_taxonomy, other_symptom, anatomy_anatomy, anatomy_biological_process, anatomy_molecular_function, anatomy_cellular_component, anatomy_taxonomy, anatomy_other, biological_process_biological_process, biological_process_molecular_function, biological_process_cellular_component, biological_process_taxonomy, biological_process_other, molecular_function_molecular_function, cellular_component_molecular_function, molecular_function_taxonomy, molecular_function_other, cellular_component_cellular_component, cellular_component_taxonomy, cellular_component_other, taxonomy_taxonomy, other_taxonomy, other_other]
  primekg:
    enabled: true
    weight: 1.0
    node_types: [drug, protein, side_effect, disease, pathway, phenotype, anatomy, biological_process, molecular_function, cellular_component, exposure, other]
    edge_types: [drug_protein, drug_side_effect, drug_disease, drug_pathway, drug_phenotype, drug_anatomy, drug_biological_process, drug_molecular_function, drug_cellular_component, drug_exposure, drug_other, protein_protein, protein_side_effect, disease_protein, pathway_protein, phenotype_protein, anatomy_protein, biological_process_protein, molecular_function_protein, cellular_component_protein, exposure_protein, other_protein, side_effect_side_effect, disease_side_effect, pathway_side_effect, phenotype_side_effect, anatomy_side_effect, biological_process_side_effect, molecular_function_side_effect, cellular_component_side_effect, exposure_side_effect, other_side_effect, disease_disease, disease_pathway, disease_phenotype, anatomy_disease, biological_process_disease, disease_molecular_function, cellular_component_disease, disease_exposure, disease_other, pathway_pathway, pathway_phenotype, anatomy_pathway, biological_process_pathway, molecular_function_pathway, cellular_component_pathway, exposure_pathway, other_pathway, phenotype_phenotype, anatomy_phenotype, biological_process_phenotype, molecular_function_phenotype, cellular_component_phenotype, exposure_phenotype, other_phenotype, anatomy_anatomy, anatomy_biological_process, anatomy_molecular_function, anatomy_cellular_component, anatomy_exposure, anatomy_other, biological_process_biological_process, biological_process_molecular_function, biological_process_cellular_component, biological_process_exposure, biological_process_other, molecular_function_molecular_function, cellular_component_molecular_function, exposure_molecular_function, molecular_function_other, cellular_component_cellular_component, cellular_component_exposure, cellular_component_other, exposure_exposure, exposure_other, other_other]
  include_side_effects: false

static_prior:
  enabled: true
  sources:
    - primekg
    - gdsc_screened_compounds

notes:
  - HVG2000 fork of the random cell split benchmark.
  - Default mode is direct HVG input with 2000 selected genes.







explainability:
  enabled: true
  level: path
  export_top_edges: true
  export_top_nodes: true
  export_top_paths: true
  run_ablation: true
  top_k_edges: 8
  top_k_nodes: 6
  top_k_paths: 10
  path_max_hops: 4

perturbation:
  enabled: true
  stub_mode: true
  output_dir: perturbation
  action_top_k: 5
  action_levels: [edge, node]
  node_top_k: 3
  allowed_node_types: [gene, protein, pathway, biological_process, molecular_function]
  max_edges_per_action: 100
  calibration_method: drug_specific_percentile
  resistant_percentile: 0.8
  partial_resistant_percentile: 0.6
  sensitive_percentile: 0.25
  min_calibration_rows: 10
  random_controls: 8
  random_match_by_source: true
  random_match_by_node_type: true
  random_match_by_degree_bin: true
