benchmark_id: gdsc
benchmark_name: gdsc
dataset_name: gdsc
task_type: gdsc_regression

# split_type 候选项见 01_random_cell_split；这里使用 drug，按药物留出，检验 unseen-drug 泛化。
# - 该设置会把同一 DRUG_ID 的样本集中到同一 split，避免药物泄漏。
split_type: drug
split_seed: 7
train_fraction: 0.7
val_fraction: 0.1
test_fraction: 0.2

n_hvg: 2000
epochs: 50
batch_size: 512
eval_batch_size: null
lr: 0.00006
top_k: 5
# - regression: 只做回归式对照；通常配合 ablation 或最简基线。


input_projection:
  mode: hvg
  hvg_n_genes: 2000
  pca_n_components: 512
  hvg_selection_method: variance

# model / world_model / training / batch / evaluation 的语义与 01_random_cell_split 相同。
# 这里只强调：drug-disjoint 切分会更难，因为模型不能靠“见过同一个药”的记忆来投机。
model:
  mode: drug_residual_world_model
  target_field: AUC
world_model:
  relative_value:
    enabled: true
    train_field: relative_value_train
    eval_field: relative_value_eval
    direction: auc_lower_is_better
  terminal_consequence:
    enabled: true
  planner:
    enabled: true
    top_k: 5

training:
  loss_raw_weight: 0.5
  loss_value_weight: 0.25
  loss_drug_centered_weight: 0.0
  loss_cell_residual_weight: 2.0
  loss_within_drug_rank_weight: 0.35
  loss_policy_advantage_weight: 0.0
  loss_same_cell_cross_drug_rank_weight: 0.5
  loss_graph_consistency_weight: 0.0
  validation_objective: val_within_drug_pcc
batch:
  sampler: hybrid_drug_level
  n_cell_lines: 32
  n_drugs: 16
  rank_batch_fraction: 0.25
  min_cell_drugs_per_batch: 2
  min_drug_cells_per_batch: 2
# evaluation:
#   planner_metric_field: relative_value_eval
#   fusion_selection_metric: within_drug_pcc_mean
#   fusion_weight_candidates: [0.0, 0.5, 1.0, 1.5, 2.0]
#   target_within_drug_pcc: 0.6
#   sample_guardrail_delta: 0.01
#   strict_test_rows: 45583
#   strict_test_drugs: 57
evaluation_profiles:
  - gdsc
export_planning_predictions: true
export_terminal_latents: true
export_gate_audit: true
max_rows: null
gdsc_source_mode: v2
canonical_drug_indexing: true
coverage_aware_kg_mask: true
notes:
  - PRISM secondary unseen-drug holdout benchmark with GDSC-like evaluation semantics.



explainability:
  enabled: true
  level: path
  export_top_edges: true
  export_top_nodes: true
  export_top_paths: true
  run_ablation: true
  top_k_edges: 8
  top_k_nodes: 6
  top_k_paths: 10
  path_max_hops: 4


perturbation:
  enabled: true
  stub_mode: true
  output_dir: perturbation
  action_top_k: 20
  action_levels: [edge, node]
  node_top_k: 10
  allowed_node_types: [gene, protein, pathway, biological_process, molecular_function]
  max_edges_per_action: 100
  calibration_method: drug_specific_percentile
  resistant_percentile: 0.8
  partial_resistant_percentile: 0.6
  sensitive_percentile: 0.25
  min_calibration_rows: 10
  random_controls: 100
  random_match_by_source: true
  random_match_by_node_type: true
  random_match_by_degree_bin: true
